<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anime Watch Sync</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --panel-glass: rgba(30, 41, 59, 0.85);
            --accent: #3b82f6;
            --accent-glass: rgba(59, 130, 246, 0.15);
            --text: #f8fafc;
            --subtext: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --watched: #10b981;
            --danger: #ef4444;
            --nav-height: 65px;
        }
        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); overflow-x: hidden; height: 100%; 
            -webkit-tap-highlight-color: transparent;
        }
        * { box-sizing: border-box; }
        
        /* Layout */
        .app-container { display: flex; flex-direction: column; height: 100%; padding-bottom: var(--nav-height); }
        @media (min-width: 768px) {
            .app-container { flex-direction: row; padding-bottom: 0; padding-left: 200px; }
        }

        /* Navigation */
        nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height);
            background: var(--panel-glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 50; padding-bottom: env(safe-area-inset-bottom);
        }
        @media (min-width: 768px) {
            nav {
                top: 0; width: 200px; height: 100%; flex-direction: column; justify-content: flex-start;
                border-top: none; border-right: 1px solid var(--border); padding-top: 30px; gap: 10px;
            }
        }
        .tab { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--subtext); cursor: pointer; transition: 0.3s; flex: 1; height: 100%;
            font-size: 11px; font-weight: 500; gap: 4px;
        }
        @media (min-width: 768px) {
            .tab { flex: none; width: 80%; height: 45px; flex-direction: row; justify-content: flex-start; padding: 0 15px; border-radius: 12px; font-size: 14px; gap: 10px; }
        }
        .tab.active { color: var(--accent); }
        @media (min-width: 768px) { .tab.active { background: var(--accent-glass); } }
        .tab-icon { font-size: 20px; }
        
        main { flex: 1; padding: 20px; overflow-y: auto; }
        
        /* Search */
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; position: relative; }
        .search-box input { 
            flex: 1; padding: 16px 20px; border-radius: 16px; border: 1px solid var(--border); 
            background: var(--panel); color: var(--text); font-size: 16px; outline: none; transition: 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 4px 25px rgba(59,130,246,0.2); }
        .search-box button { 
            padding: 0 25px; border-radius: 16px; border: none; background: var(--accent); 
            color: #fff; font-weight: 600; cursor: pointer; font-size: 16px; transition: 0.3s;
        }
        .search-box button:active { transform: scale(0.95); }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; }
        @media (min-width: 500px) { .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; } }
        
        .card { 
            background: var(--panel); border-radius: 16px; overflow: hidden; cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; border: 1px solid var(--border);
            display: flex; flex-direction: column; position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #111; }
        .card .info { padding: 12px; display: flex; flex-direction: column; flex: 1; }
        .card .title { font-size: 14px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px; }
        .card .year { font-size: 12px; color: var(--subtext); }
        .badge { 
            position: absolute; top: 8px; right: 8px; background: rgba(15,23,42,0.8); backdrop-filter: blur(5px);
            padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; color: var(--accent);
            border: 1px solid var(--border);
        }
        
        /* Modal */
        #modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); 
            z-index: 100; display: none; flex-direction: column; overflow-y: auto; overflow-x: hidden;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #modal.active { display: flex; transform: translateY(0); }
        
        .modal-header { 
            position: sticky; top: 0; padding: 15px; background: rgba(15,23,42,0.9); backdrop-filter: blur(15px);
            display: flex; gap: 15px; align-items: center; z-index: 10; border-bottom: 1px solid var(--border);
        }
        .back-btn { 
            background: var(--panel); border: 1px solid var(--border); color: var(--text); 
            padding: 8px 16px; border-radius: 12px; font-size: 14px; cursor: pointer; font-weight: 600;
        }
        
        /* Player */
        #player-container { 
            position: sticky; top: 65px; width: 100%; aspect-ratio: 16/9; background: #000; 
            z-index: 5; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .modal-content { padding: 20px; }
        .hero { display: flex; gap: 20px; margin-bottom: 25px; }
        .hero img { width: 120px; border-radius: 12px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .hero h2 { margin: 0 0 10px 0; font-size: 20px; line-height: 1.2; }
        .desc { font-size: 14px; color: var(--subtext); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
        
        .status-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        @media (min-width: 500px) { .status-actions { display: flex; } }
        .status-btn { 
            padding: 12px 5px; border-radius: 12px; border: 1px solid var(--border); background: var(--panel); 
            color: var(--subtext); text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s;
        }
        .status-btn.active { background: var(--accent-glass); border-color: var(--accent); color: var(--accent); }
        .status-btn:active { transform: scale(0.95); }
        
        select { 
            width: 100%; padding: 16px; border-radius: 16px; background: var(--panel); color: var(--text); 
            border: 1px solid var(--border); font-size: 15px; margin-bottom: 20px; outline: none; appearance: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .ep-list { display: flex; flex-direction: column; gap: 10px; }
        .ep-item { 
            display: flex; justify-content: space-between; align-items: center; padding: 16px; 
            background: var(--panel); border-radius: 16px; border: 1px solid var(--border); 
            cursor: pointer; transition: 0.2s;
        }
        .ep-item:hover { background: rgba(255,255,255,0.05); }
        .ep-item.watched { border-color: var(--watched); background: rgba(16, 185, 129, 0.05); }
        .ep-item .time { font-size: 13px; color: var(--accent); opacity: 0.8; background: var(--accent-glass); padding: 4px 8px; border-radius: 8px;}
        .ep-item .mark-btn { 
            padding: 8px 16px; background: transparent; border: 1px solid var(--border); 
            border-radius: 10px; color: var(--text); font-size: 12px; cursor: pointer; font-weight: 600;
        }
        .ep-item.watched .mark-btn { background: rgba(16, 185, 129, 0.15); border-color: var(--watched); color: var(--watched); }
        
        .loader { text-align: center; padding: 40px; color: var(--subtext); font-size: 15px; }
        
        #sync-indicator { 
            position: fixed; bottom: calc(var(--nav-height) + 20px); right: 20px; 
            background: rgba(15,23,42,0.9); backdrop-filter: blur(5px); border: 1px solid var(--border); 
            padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; color: #fff; 
            display: none; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <nav>
        <div class="tab active" onclick="switchTab('search')"><span class="tab-icon">🔍</span><span>Поиск</span></div>
        <div class="tab" onclick="switchTab('watching')"><span class="tab-icon">📺</span><span>Смотрю</span></div>
        <div class="tab" onclick="switchTab('planned')"><span class="tab-icon">📅</span><span>В планах</span></div>
        <div class="tab" onclick="switchTab('on_hold')"><span class="tab-icon">⏸</span><span>Отложено</span></div>
        <div class="tab" onclick="switchTab('completed')"><span class="tab-icon">✅</span><span>Готово</span></div>
        <div class="tab" onclick="logout()" style="color:var(--danger);"><span class="tab-icon">🚪</span><span>Выход</span></div>
    </nav>

    <main>
        <div id="tab-search">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Название аниме..." onkeydown="if(event.key === 'Enter') doSearch()">
                <button onclick="doSearch()">Искать</button>
            </div>
            <div id="search-results" class="grid"></div>
        </div>
        <div id="tab-list" style="display:none;">
            <div id="list-results" class="grid"></div>
        </div>
    </main>
</div>

<div id="modal">
    <div class="modal-header">
        <button class="back-btn" onclick="closeModal()">❮ Назад</button>
        <span style="font-weight: 600; font-size: 16px; flex:1; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" id="modal-title-top"></span>
        <div style="width: 70px;"></div>
    </div>
    
    <div id="player-container">
        <iframe id="video-player" allowfullscreen allow="autoplay *; fullscreen *"></iframe>
    </div>
    
    <div class="modal-content">
        <div class="hero">
            <img id="m-cover" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
            <div>
                <h2 id="m-title"></h2>
                <div class="desc" id="m-desc">Загрузка информации...</div>
            </div>
        </div>
        
        <div class="status-actions" id="m-statuses">
            <div class="status-btn" onclick="setStatus('watching')">Смотрю</div>
            <div class="status-btn" onclick="setStatus('planned')">В планах</div>
            <div class="status-btn" onclick="setStatus('completed')">Готово</div>
            <div class="status-btn" onclick="setStatus('on_hold')">Отложено</div>
            <div class="status-btn" onclick="setStatus('dropped')">Брошено</div>
            <div class="status-btn" style="color:var(--danger); border-color:var(--danger);" onclick="setStatus('')">Удалить</div>
        </div>
        
        <select id="m-trans" onchange="renderEpisodes()"></select>
        <div class="ep-list" id="m-eps"></div>
    </div>
</div>

<div id="sync-indicator">Синхронизация...</div>

<script>
    const TOKEN = localStorage.getItem('AUTH_TOKEN');
    const API_URL = localStorage.getItem('API_URL');
    
    if (!TOKEN || !API_URL) {
        window.location.href = 'login.html';
    }

    const headers = { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };

    let listsData = {};
    let statusData = {};
    let syncTimer = null;
    let pollerInterval = null;

    let currentAnime = null;
    let currentResults = null;
    let currentPlayingEp = null;

    const CAT_LABELS = { "watching": "Смотрю", "planned": "В планах", "on_hold": "Отложено", "dropped": "Брошено", "completed": "Просмотрено" };

    function logout() {
        localStorage.removeItem('AUTH_TOKEN');
        window.location.href = 'login.html';
    }

    function showSync(text) {
        let el = document.getElementById('sync-indicator');
        el.textContent = text;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2500);
    }

    async function apiFetch(endpoint, options={}) {
        options.headers = {...headers, ...options.headers};
        let res = await fetch(`${API_URL}${endpoint}`, options);
        if (res.status === 401) logout();
        return res;
    }

    async function pullData() {
        try {
            let res = await apiFetch('/api/user/data');
            if (res.ok) {
                let data = await res.json();
                let changed = JSON.stringify(listsData) !== JSON.stringify(data.listsData) || 
                              JSON.stringify(statusData) !== JSON.stringify(data.statusData);
                listsData = data.listsData || {};
                statusData = data.statusData || {};
                if (changed) {
                    refreshUI();
                }
            }
        } catch(e) { console.error("Pull error", e); }
    }

    async function pushData() {
        if (syncTimer) clearTimeout(syncTimer);
        syncTimer = setTimeout(async () => {
            syncTimer = null;
            showSync('Синхронизация...');
            try {
                let res = await apiFetch('/api/user/data', {
                    method: 'POST',
                    body: JSON.stringify({ listsData, statusData })
                });
                if(res.ok) showSync('✅ Облако обновлено');
                else showSync('❌ Ошибка синхронизации');
            } catch(e) { showSync('❌ Ошибка сети'); }
        }, 2000);
    }

    function initApp() {
        pullData();
        pollerInterval = setInterval(pullData, 15000);
        
        window.addEventListener('message', function(event) {
            if (event.data && event.data.key === 'kodik_player_time_update') {
                let time = event.data.value;
                if (time > 0 && currentAnime && currentPlayingEp !== null) {
                    let stKey = `${currentAnime.shiki_id}_${currentAnime.trans_id}_${currentPlayingEp}`;
                    let st = statusData[stKey] || {};
                    let w = typeof st === 'boolean' ? st : (st.watched || false);
                    statusData[stKey] = { watched: w, time: Math.floor(time) };
                    pushData();
                }
            }
        });
    }

    function refreshUI() {
        if(document.getElementById('modal').classList.contains('active')) {
            updateStatusButtons();
            renderEpisodes();
        }
        let activeTab = document.querySelector('.tab.active').getAttribute('onclick');
        if (activeTab && activeTab.includes("switchTab('") && !activeTab.includes("search")) {
            let cat = activeTab.match(/'([^']+)'/)[1];
            renderList(cat);
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
        
        if (tab === 'search') {
            document.getElementById('tab-search').style.display = 'block';
            document.getElementById('tab-list').style.display = 'none';
        } else {
            document.getElementById('tab-search').style.display = 'none';
            document.getElementById('tab-list').style.display = 'block';
            renderList(tab);
        }
        window.scrollTo(0,0);
    }

    function renderList(cat) {
        let container = document.getElementById('list-results');
        let items = Object.values(listsData).filter(v => v.status === cat);
        
        if (!items.length) {
            container.innerHTML = '<div class="loader">В этом списке пока пусто.</div>';
            return;
        }
        
        let html = '';
        for (let item of items) {
            html += `
                <div class="card" onclick="openAnime(${item.shiki_id}, '${item.title.replace(/'/g, "\\'")}', '${item.trans_id || ''}')">
                    <img src="https://shikimori.one/system/animes/original/${item.shiki_id}.jpg" loading="lazy">
                    <div class="info"><div class="title">${item.title}</div></div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    async function doSearch() {
        let q = document.getElementById('search-input').value.trim();
        if (!q) return;
        
        let container = document.getElementById('search-results');
        container.innerHTML = '<div class="loader">Ищем...</div>';
        
        try {
            let res = await apiFetch(`/api/search?title=${encodeURIComponent(q)}`);
            let data = await res.json();
            
            if (!data.results || !data.results.length) {
                container.innerHTML = '<div class="loader">Ничего не найдено</div>';
                return;
            }
            
            let groups = {};
            for (let r of data.results) {
                if (!r.shikimori_id) continue;
                if (!groups[r.shikimori_id]) groups[r.shikimori_id] = { title: r.title, year: r.year, items: [] };
                groups[r.shikimori_id].items.push(r);
            }
            
            let html = '';
            for (let sid in groups) {
                let g = groups[sid];
                let badge = listsData[sid] ? `<div class="badge">${CAT_LABELS[listsData[sid].status] || listsData[sid].status}</div>` : '';
                html += `
                    <div class="card" onclick="openAnimeData(${sid}, '${g.title.replace(/'/g, "\\'")}', '${encodeURIComponent(JSON.stringify(g.items))}')">
                        ${badge}
                        <img src="https://shikimori.one/system/animes/original/${sid}.jpg" loading="lazy">
                        <div class="info">
                            <div class="title">${g.title}</div>
                            <div class="year">${g.year || '?'}</div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        } catch(e) { container.innerHTML = '<div class="loader">Ошибка поиска</div>'; }
    }

    async function openAnime(shiki_id, title, preferred_trans_id) {
        document.getElementById('modal').classList.add('active');
        document.getElementById('modal-title-top').textContent = title;
        document.getElementById('m-title').textContent = title;
        document.getElementById('m-desc').textContent = "Загрузка...";
        document.getElementById('m-cover').src = `https://shikimori.one/system/animes/original/${shiki_id}.jpg`;
        document.getElementById('m-eps').innerHTML = '<div class="loader">Загрузка серий...</div>';
        document.getElementById('m-trans').innerHTML = '';
        
        try {
            let res = await apiFetch(`/api/search?shikimori_id=${shiki_id}`);
            let data = await res.json();
            let items = data.results || [];
            if(!items.length) {
                document.getElementById('m-eps').innerHTML = '<div class="loader">Нет серий</div>';
                return;
            }
            openAnimeData(shiki_id, title, encodeURIComponent(JSON.stringify(items)), preferred_trans_id);
        } catch(e) { document.getElementById('m-desc').textContent = "Ошибка сети."; }
    }

    function openAnimeData(shiki_id, title, itemsJsonUrl, preferred_trans_id) {
        currentAnime = { shiki_id, title };
        currentResults = JSON.parse(decodeURIComponent(itemsJsonUrl));
        
        document.getElementById('m-title').textContent = title;
        document.getElementById('modal-title-top').textContent = title;
        document.getElementById('m-desc').textContent = "Загрузка описания...";
        document.getElementById('m-cover').src = `https://shikimori.one/system/animes/original/${shiki_id}.jpg`;
        document.getElementById('modal').classList.add('active');
        stopPlayer();
        
        fetch(`https://shikimori.one/api/animes/${shiki_id}`)
            .then(r => r.json())
            .then(shiki => {
                if (shiki && shiki.description) document.getElementById('m-desc').textContent = shiki.description.replace(/\[.*?\]/g, '');
                else document.getElementById('m-desc').textContent = "Описание отсутствует.";
            }).catch(()=> document.getElementById('m-desc').textContent = "");
        
        updateStatusButtons();
        
        let transSelect = document.getElementById('m-trans');
        transSelect.innerHTML = '';
        let transGroups = {};
        for (let r of currentResults) {
            let t = r.translation ? r.translation.title : "Оригинал";
            transGroups[t] = r;
        }
        
        let selectedIdx = 0;
        Object.keys(transGroups).forEach((t, i) => {
            let opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            transSelect.appendChild(opt);
            let tid = transGroups[t].translation ? transGroups[t].translation.id : null;
            if (preferred_trans_id && String(tid) === String(preferred_trans_id)) selectedIdx = i;
        });
        
        transSelect.selectedIndex = selectedIdx;
        renderEpisodes();
    }

    function updateStatusButtons() {
        let savedStatus = listsData[currentAnime.shiki_id] ? listsData[currentAnime.shiki_id].status : null;
        document.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('active'));
        if (savedStatus) {
            let btn = document.querySelector(`.status-btn[onclick="setStatus('${savedStatus}')"]`);
            if (btn) btn.classList.add('active');
        }
    }

    function setStatus(status) {
        let transSelect = document.getElementById('m-trans');
        let selectedT = transSelect.value;
        let transData = currentResults.find(r => (r.translation ? r.translation.title : "Оригинал") === selectedT);
        let trans_id = transData.translation ? transData.translation.id : null;
        
        if (status === '') {
            delete listsData[currentAnime.shiki_id];
            // Hack to force delete empty status
            listsData[currentAnime.shiki_id] = {status: ''}; 
        } else {
            listsData[currentAnime.shiki_id] = {status: status, title: currentAnime.title, trans_id: trans_id, shiki_id: currentAnime.shiki_id, trans_title: selectedT};
        }
        pushData();
        updateStatusButtons();
        refreshUI();
    }

    function renderEpisodes() {
        let transSelect = document.getElementById('m-trans');
        let selectedT = transSelect.value;
        let transData = currentResults.find(r => (r.translation ? r.translation.title : "Оригинал") === selectedT);
        
        let epMap = {}; 
        if (transData.seasons) {
            for (let s in transData.seasons) {
                for (let e in transData.seasons[s].episodes) {
                    epMap[`Сезон ${s} Серия ${e}`] = { num: parseInt(e), link: transData.seasons[s].episodes[e] };
                }
            }
        }
        if (Object.keys(epMap).length === 0) epMap["Фильм"] = { num: 0, link: transData.link };
        
        let sortedKeys = Object.keys(epMap).sort((a,b) => {
            let na = a.match(/\d+/g) || [0];
            let nb = b.match(/\d+/g) || [0];
            for(let i=0; i<na.length; i++) {
                if (parseInt(na[i]) !== parseInt(nb[i])) return parseInt(na[i]) - parseInt(nb[i]);
            }
            return 0;
        });
        
        let trans_id = transData.translation ? transData.translation.id : null;
        currentAnime.trans_id = trans_id;
        
        let container = document.getElementById('m-eps');
        let html = '';
        for (let k of sortedKeys) {
            let epInfo = epMap[k];
            let stKey = `${currentAnime.shiki_id}_${trans_id}_${epInfo.num}`;
            let st = statusData[stKey] || {};
            let watched = typeof st === 'boolean' ? st : (st.watched || false);
            let time = typeof st === 'boolean' ? 0 : (st.time || 0);
            
            let tStr = '';
            if (time > 0) {
                let m = Math.floor(time/60);
                let s = time%60;
                tStr = `${m}:${s.toString().padStart(2,'0')}`;
            }
            
            html += `
                <div class="ep-item ${watched ? 'watched' : ''}" onclick="playEp(${epInfo.num}, '${epInfo.link}', ${time})">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span style="font-size: 16px;">${watched ? '🟢' : '⚪'}</span>
                        <span style="font-weight: 500;">${k}</span>
                        ${tStr ? `<span class="time">${tStr}</span>` : ''}
                    </div>
                    <button class="mark-btn" onclick="event.stopPropagation(); toggleWatched(${epInfo.num})">${watched ? 'Снять' : 'Отметить'}</button>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function toggleWatched(ep_num) {
        let stKey = `${currentAnime.shiki_id}_${currentAnime.trans_id}_${ep_num}`;
        let st = statusData[stKey] || {};
        let w = typeof st === 'boolean' ? st : (st.watched || false);
        let t = typeof st === 'boolean' ? 0 : (st.time || 0);
        statusData[stKey] = { watched: !w, time: t };
        
        pushData();
        renderEpisodes();
    }

    function playEp(ep_num, link, startTime) {
        let pCont = document.getElementById('player-container');
        pCont.style.display = 'block';
        
        let url = link;
        if(url.startsWith('//')) url = 'https:' + url;
        
        // Добавляем параметры качества 720p (если плеер поддерживает)
        let separator = url.includes('?') ? '&' : '?';
        url += `${separator}quality=720&vq=720`;
        
        if (startTime > 0) {
            url += `&time=${startTime}`;
        }
        
        document.getElementById('video-player').src = url;
        currentPlayingEp = ep_num;
        
        setTimeout(() => pCont.scrollIntoView({behavior: "smooth", block: "start"}), 300);
    }

    function stopPlayer() {
        let v = document.getElementById('video-player');
        if (v && currentPlayingEp !== null) v.src = "";
        document.getElementById('player-container').style.display = 'none';
        currentPlayingEp = null;
    }

    function closeModal() {
        stopPlayer();
        document.getElementById('modal').classList.remove('active');
        refreshUI();
    }

    // Start
    initApp();
</script>
</body>
</html>
